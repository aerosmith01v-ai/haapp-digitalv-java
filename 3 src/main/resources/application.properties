# ── Servidor ──────────────────────────────────────────────
server.port=${PORT:3002}

# ── App ───────────────────────────────────────────────────
spring.application.name=HaaPpDigitalV

# ── H2 Base de datos (persistencia en archivo) ────────────
spring.datasource.url=jdbc:h2:file:./data/haappdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=haapp
spring.datasource.password=kuhul123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# ── SOFI Red distribuida ───────────────────────────────────
sofi.node.url=${SOFI_NODE_URL:}
sofi.python.url=${SOFI_PYTHON_URL:}
hz.kuhul=12.3

# ── Voz y audios ──────────────────────────────────────────
dir.audios=./audios

# ── Self URL para keep-alive ──────────────────────────────
mi.url=${MI_URL:}

# ── Multipart ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ── Logs ──────────────────────────────────────────────────
logging.level.com.haapp=INFO
logging.level.root=WARN

